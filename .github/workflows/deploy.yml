name: Deploy

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image: ${{ steps.image.outputs.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Image name (lowercase for GHCR)
        id: image
        run: echo "name=${{ env.REGISTRY }}/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # SSH-деплой: Settings → Actions → Variables → SSH_DEPLOY_ENABLED = true; секреты SSH_HOST, SSH_USER, SSH_PRIVATE_KEY; при приватном GHCR — GHCR_READ_TOKEN (PAT с read:packages).
  deploy:
    name: Deploy over SSH
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ vars.SSH_DEPLOY_ENABLED == 'true' }}

    steps:
      - name: Pull and restart container on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN
          script_stop: true
          script: |
            set -euo pipefail
            IMAGE="${{ needs.build-and-push.outputs.image }}:latest"
            if [ -n "${GHCR_TOKEN:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
            fi
            docker pull "$IMAGE"
            docker stop gita-todo-api 2>/dev/null || true
            docker rm gita-todo-api 2>/dev/null || true
            docker run -d --name gita-todo-api --restart unless-stopped -p 127.0.0.1:8080:8080 "$IMAGE"
